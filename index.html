<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Canvas Text Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
  <canvas id="myCanvas"></canvas>

    const canvas = document.getElementById('myCanvas');
    const ctx = canvas.getContext('2d');
    // 校褋褌邪薪邪胁谢懈胁邪械屑 褉邪蟹屑械褉 canvas 薪邪 胁械褋褜 褝泻褉邪薪
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let lastTime = 0;
    const animationSpeed = 30; // 屑褋: 褔械屑 斜芯谢褜褕械 褔懈褋谢芯, 褌械屑 屑械写谢械薪薪械械 邪薪懈屑邪褑懈褟

    // Alt + 0160 - 薪械褉邪蟹褉褘胁薪褘泄 锌褉芯斜械谢
    let brain = [
      "聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽##+##+------.--+####聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽",

      "聽聽聽聽聽聽聽聽聽聽聽###-聽聽聽聽聽聽聽聽聽聽聽.--聽聽聽聽聽聽聽聽..聽聽..聽聽聽.-##聽聽聽聽聽聽聽聽聽聽聽",
      "聽聽聽聽聽聽聽聽##-...聽聽聽聽.--.聽聽聽聽.+.聽聽聽聽聽聽.#-聽聽聽..聽聽聽聽聽..+#聽聽聽聽聽聽聽聽聽",
      "聽聽聽聽聽聽##-.聽聽..聽聽..##.聽聽..-#-聽聽聽聽聽聽聽.-.聽聽聽-.聽聽聽聽聽.-..#聽聽聽聽聽聽聽聽",
      "聽聽聽聽#+.聽聽聽.-.聽聽聽聽聽..聽聽聽--聽聽聽聽聽聽聽聽聽.#-聽聽聽聽..聽聽聽聽聽.-.聽聽+#聽聽聽聽聽聽",
      "聽聽#+.聽聽聽聽聽.#.聽聽.聽聽聽聽聽聽聽..聽聽聽聽聽聽聽聽聽.+.聽聽聽.#-聽聽聽聽聽聽聽聽聽聽聽-#聽聽聽聽聽",
      "聽#-聽聽聽聽聽聽聽聽聽聽..#.聽聽聽聽聽聽..聽聽.-.聽聽聽.-#.聽聽.#.聽聽聽聽聽聽聽聽聽聽聽聽-###聽聽聽",
      "#-聽聽聽聽聽聽聽聽聽聽聽聽.#.聽聽聽聽聽聽聽聽聽.+#-.+#+..聽聽聽聽.聽聽聽聽聽聽聽.-.聽聽聽聽聽.#聽聽聽",
      "#.聽聽聽聽聽聽.+-.聽聽.#+.聽聽聽聽聽聽-#.....-.聽聽聽聽聽聽聽聽聽聽-+++..---##-..-##聽",
      "#.聽.++聽聽聽聽聽聽聽聽聽.++..聽聽.-.聽聽聽聽聽聽聽聽聽聽聽聽聽-#-.....聽.#+-.聽聽-+.聽+#聽",
      "#.聽聽聽聽聽聽聽聽聽聽聽聽..-##+.聽聽聽聽聽聽聽聽聽..聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽+#.聽聽聽聽聽聽-#",
      "#-.聽聽聽聽聽聽聽聽..聽聽.+.聽聽聽聽聽聽聽聽聽聽聽..-.聽聽聽..聽聽聽聽聽聽..聽聽聽聽.#.聽++.聽聽.#",
      "聽##.聽聽聽聽聽聽聽聽聽.+-聽聽聽聽聽聽聽...聽聽聽聽聽聽聽聽聽聽.--.-...+.聽聽..#+.聽.#-.聽.#",
      "聽聽聽#-.聽聽聽聽..聽..聽聽聽聽聽聽聽.##.聽聽聽聽聽聽聽聽聽聽...聽聽聽聽聽聽聽.-...聽聽聽..##.-#",
      "聽聽聽聽聽聽##+++-.#-聽聽聽聽聽聽聽聽.-聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽.+---+---++####聽",
      "聽聽聽聽聽聽聽聽聽聽聽聽聽#.聽聽聽聽聽聽聽聽聽.聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽-#聽聽聽聽",
      "聽聽聽聽聽聽聽聽聽聽聽聽聽#.聽聽聽聽聽聽聽聽聽.聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽.#聽聽聽",
      "聽聽聽聽聽聽聽聽聽聽聽聽聽聽#+-..聽聽聽聽聽聽聽.-+##-.聽聽聽.##+--++.--.聽聽聽聽聽聽聽.##聽聽聽",
      "聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽###+-+##聽聽聽聽聽####.聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽-#聽聽聽聽聽",
      "聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽#+....聽聽聽聽聽聽聽聽聽聽聽.##聽聽聽聽聽聽",
      "聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽###+--...聽.聽.-+##聽聽聽聽聽聽聽聽",
      "聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽#+.聽-#####聽聽聽聽聽聽聽聽聽聽聽聽聽",
      "聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽#-聽.#聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽",
      "聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽#.聽+#聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽",
      "聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽#--#聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽"
    ];

    let animatedSin = [
      "%@%%%%@%聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽", 
      "%聽聽聽聽聽聽@@@聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽%@",
      "聽聽聽聽聽聽聽聽聽@%%%聽聽聽聽聽聽聽聽聽聽%%聽聽",
      "聽聽聽聽聽聽聽聽聽聽聽%%%%聽聽聽聽聽聽%%聽聽聽聽",
      "聽聽聽聽聽聽聽聽聽聽聽聽聽%%@%%%@%聽聽聽聽聽聽"
    ];
    let animatedSin_backup = [
      "聽聽@@@@@@@@聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽%@%%%%@%聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽", 
      "@%%聽聽聽聽聽聽@@@聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽%@聽聽聽聽聽聽聽@@%聽聽聽聽聽聽聽聽聽聽聽聽聽",
      "%聽聽聽聽聽聽聽聽聽聽@%%%聽聽聽聽聽聽聽聽聽聽%%聽聽聽聽聽聽聽聽聽聽聽%%%聽聽聽聽聽聽聽聽聽%%",
      "聽聽聽聽聽聽聽聽聽聽聽聽聽%%%%聽聽聽聽聽聽%%聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽%%%聽聽聽聽聽聽%%聽",
      "聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽%%@%%%@%聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽聽@@@@@@@聽聽聽"
    ];

    let display = { 
      arr: [""],
      wallChar: '-',
      currentRow: 1,
      currentCol: 1,
      maxRows: 27,
      maxCols: 32 
    };
    for (let i = 0; i < display.maxRows; i++) {
      if (i == 0 || i == display.maxRows - 1) display.arr[i] = display.wallChar.repeat(display.maxCols); // 锌械褉胁邪褟 懈 锌芯褋谢械写薪褟褟 褋褌褉芯泻邪
      else display.arr[i] = display.wallChar + '聽'.repeat(display.maxCols - 2) + display.wallChar; // 芯褋褌邪谢褜薪褘械 褋褌褉芯泻懈
    }
    //display.maxCols = display.arr[0].length - 1;
    //display.maxRows = display.arr.length - 1;


    function filldisplayWithRandomBits(_display) {
      if (_display.currentRow >= _display.maxRows - 1 || _display.currentCol >= _display.maxCols - 1) {
        // 小斜褉邪褋褘胁邪械屑 胁褋械 胁薪褍褌褉械薪薪懈械 褋褌褉芯泻懈 薪邪 懈褋褏芯写薪芯械 褋芯褋褌芯褟薪懈械 褋 薪械褉邪蟹褉褘胁薪褘屑懈 锌褉芯斜械谢邪屑懈
        for (let i = 1; i < _display.maxRows - 1; i++) {
          _display.arr[i] = display.wallChar + '聽'.repeat(_display.maxCols - 2) + display.wallChar
        }

        // 袙芯蟹胁褉邪褖邪械屑 锌芯蟹懈褑懈褞 胁 薪邪褔邪谢芯
        _display.currentRow = 1;
        _display.currentCol = 1;
      }
      

      if (_display.arr[_display.currentRow][_display.currentCol] === '聽') {
        const bit = Math.random() < 0.5 ? '0' : '1';
        const row = _display.arr[_display.currentRow];
        _display.arr[_display.currentRow] = row.slice(0, _display.currentCol) + bit + row.slice(_display.currentCol + 1);
      }

      _display.currentCol++;
      if (_display.currentCol >= _display.maxCols - 1) {
        _display.currentCol = 1;
        _display.currentRow++;
      }

      return true;
    }

    function shiftStrings(arr) {
      return arr.map(str => {
        return str[str.length - 1] + str.slice(0, -1); // 袘械褉褢屑 锌芯褋谢械写薪懈泄 褋懈屑胁芯谢 懈 写芯斜邪胁谢褟械屑 胁 薪邪褔邪谢芯 芯褋褌邪谢褜薪褘械 褋懈屑胁芯谢褘 (泻褉芯屑械 锌芯褋谢械写薪械谐芯)
      });
    }

    let fSize = 12;
    const divCoef = 0.5498046875; // charWidth / fSize (fSize / charWidth = 1.8188277087033748)
    const fSizeCoef = 1.8188277087033748;
    let charCount;
    let charWidth;
    let offset = {x: 0, y: 0}; // 芯褌褋褌褍锌褘 芯褌 泻褉邪褢胁 锌褉懈 芯褌褉懈褋芯胁泻械
    
    function updateSizes() { // 屑邪褋褕褌邪斜懈褉芯胁邪薪懈械
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      charCount = display.arr[0].length + brain[0].length + animatedSin[0].length + 4;
      charWidth = canvas.width / charCount;
      fSize = charWidth * fSizeCoef; 
      offset.x = 2 * charWidth;
      offset.y = 1 * fSize;
    }
    updateSizes();

    function draw() {      
      // 袟邪谢懈胁泻邪 canvas
      ctx.fillStyle = '#222224';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      charWidth = ctx.measureText("_").width; // 褍褋褌芯褔薪械薪懈械 褕懈褉懈薪褘 褋懈屑胁芯谢邪
      ctx.font = `${fSize}px Consolas, monospace`; // 校褋褌邪薪邪胁谢懈胁邪械屑 褕褉懈褎褌 Consolas
      // 褋懈薪褍褋
      ctx.fillStyle = '#a08000';//'#ccf';
      animatedSin.forEach((elem, index) => {
        ctx.fillText(elem, offset.x + parseInt(brain[0].length) * charWidth, offset.y + parseInt(brain.length/2.2) * fSize + fSize * index);      
      });
      // 屑芯蟹谐
      ctx.fillStyle = '#ff5060';
      brain.forEach((elem, index) => {      
        ctx.fillText(elem, offset.x, offset.y + fSize + fSize * index);      
      });
      // 褝泻褉邪薪
      ctx.fillStyle = '#00a080';//'#cfc';
      display.arr.forEach((elem, index) => {      
        ctx.fillText(elem, offset.x + (brain[0].length + animatedSin[0].length) * charWidth, offset.y + parseInt(brain.length/2.2) * fSize - parseInt(display.arr.length/2) * fSize + 3 * fSize + fSize * index);      
      });
      
      // 校胁械谢懈褔懈胁邪械屑 褋屑械褖械薪懈械 写谢褟 邪薪懈屑邪褑懈懈 褋懈薪褍褋邪
      animatedSin = shiftStrings(animatedSin);
      filldisplayWithRandomBits(display);
    }

    // 袟邪锌褍褋泻邪械屑 邪薪懈屑邪褑懈褞
    function animate(currentTime) {
        // 袩褉芯胁械褉褟械屑, 锌褉芯褕谢芯 谢懈 写芯褋褌邪褌芯褔薪芯 胁褉械屑械薪懈
        if (currentTime - lastTime >= animationSpeed) {
            draw(); // 褎褍薪泻褑懈褟 芯褌褉懈褋芯胁泻懈 褌械泻褋褌邪
            lastTime = currentTime;
        }
        requestAnimationFrame(animate);
    }
    animate();

    // 袨斜褉邪斜芯褌褔懈泻 懈蟹屑械薪械薪懈褟 褉邪蟹屑械褉邪 芯泻薪邪
    window.addEventListener('resize', () => {
      updateSizes();
    });
  </script>
</body>
</html>
